<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body { font-family: Segoe UI, sans-serif; margin: 16px; user-select: none; }
    p { margin: 0 0 10px; font-size: 13px; }
    input[type=text] { width: 100%; padding: 6px 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 3px; }
    input[type=text]:focus { outline: none; border-color: #0078d4; }
    .buttons { margin-top: 12px; display: flex; gap: 8px; justify-content: flex-end; }
    button { padding: 5px 16px; font-size: 13px; border-radius: 3px; border: 1px solid #ccc; cursor: pointer; background: #f0f0f0; }
    #ok { background: #0078d4; color: white; border-color: #0078d4; }
    #ok:hover { background: #106ebe; }
  </style>
</head>
<body>
  <p id="prompt-text"></p>
  <input type="text" id="input" />
  <div class="buttons">
    <button id="cancel" type="button">Cancel</button>
    <button id="ok" type="button">OK</button>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    const params = new URLSearchParams(window.location.search);
    document.getElementById('prompt-text').textContent = params.get('message') || 'Enter value:';
    document.getElementById('input').type = params.get('type') || 'text';

    function submit() {
      const val = document.getElementById('input').value.trim();
      if (val) ipcRenderer.send('prompt-result', val);
    }

    document.getElementById('ok').addEventListener('click', submit);
    document.getElementById('cancel').addEventListener('click', () => ipcRenderer.send('prompt-result', null));
    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submit();
      if (e.key === 'Escape') ipcRenderer.send('prompt-result', null);
    });
  </script>
</body>
</html>
